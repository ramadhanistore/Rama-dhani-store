<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama Dhani Joki - Honor of Kings - Harga Hemat & Proses Cepat</title>
    <style>
        :root {
            --bg-dark: #0a192f; /* Biru Navy Gelap */
            --bg-card: #112240;
            --main-accent: #f39c12;
            --sub-accent: #64ffda;
            --text-main: #e6f1ff;
            --text-sub: #8892b0;
            --border: #233554;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* TESTIMONI SECTION */
        .testi-section { margin-bottom: 60px; padding: 40px 20px; background: rgba(17, 34, 64, 0.5); border-radius: 20px; }
        .testi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; justify-items: center; }
        .testi-item { width: 100%; max-width: 350px; text-align: center; }
        
        .main-banner { width: 100%; border-radius: 15px; border: 2px solid var(--border); margin-bottom: 40px; overflow: hidden; box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5); }
        .main-banner img { width: 100%; height: auto; display: block; }
        h1, h2 { text-transform: uppercase; letter-spacing: 2px; font-weight: 800; text-align: center; margin-bottom: 20px; }
        h1 { color: var(--main-accent); font-size: 3rem; text-shadow: 0 0 10px rgba(243, 156, 18, 0.5); }
        
        .grid-pricelist { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 60px; }
        .pricelist-card { background-color: var(--bg-card); border: 2px solid var(--border); border-radius: 12px; padding: 25px; transition: all 0.3s ease; text-align: center; }
        .pricelist-card:hover { border-color: var(--sub-accent); transform: translateY(-5px); }
        .card-label { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background-color: var(--sub-accent); color: #0a192f; font-size: 0.8rem; font-weight: 700; padding: 3px 15px; border-radius: 10px; text-transform: uppercase; }
        .pricelist-card h3 { font-size: 1.8rem; color: var(--main-accent); margin-bottom: 8px; }
        .price { font-size: 2.2rem; font-weight: 800; color: #fff; }
        
        .btn-order { display: inline-block; background-color: var(--main-accent); color: var(--bg-dark); text-decoration: none; font-size: 1.6rem; font-weight: 800; padding: 18px 60px; border-radius: 50px; }
        .floating-wa { position: fixed; bottom: 25px; right: 25px; background-color: #25d366; color: #fff; padding: 15px 25px; border-radius: 50px; font-weight: 800; z-index: 9999; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-banner"><img src="image_0.png" alt="Rama Dhani Store"></div>
        
        <h1>RAMA DHANI JOKI</h1>
        <h2>Honor of Kings - Layanan Joki Terpercaya</h2>

        <!-- TESTIMONI CUSTOMER -->
        <section class="testi-section">
            <h2>TESTIMONI CUSTOMER</h2>
            <div class="testi-grid">
                <div class="testi-item">
                    <blockquote class="tiktok-embed" cite="https://vt.tiktok.com/ZSxbbNFbL/" data-video-id="7354399757656952069" style="max-width: 605px;min-width: 325px;"></blockquote>
                </div>
                <div class="testi-item">
                    <blockquote class="tiktok-embed" cite="https://vt.tiktok.com/ZSxbbLtD6/" data-video-id="7354400923019185414" style="max-width: 605px;min-width: 325px;"></blockquote>
                </div>
                <script async src="https://www.tiktok.com/embed.js"></script>
            </div>
        </section>

        <!-- Pricelist & Lainnya -->
        <div class="grid-pricelist">
            <!-- (Isi pricelist kamu tetap di sini) -->
        </div>

        <div class="order-container" style="text-align: center;">
            <a href="https://wa.me/6288224806307" class="btn-order">HUBUNGI & PESAN SEKARANG!</a>
        </div>
    </div>

    <a href="https://wa.me/6288224806307" class="floating-wa">💬 HUBUNGI KAMI</a>

</body>
</html>
